name: Cross-Repo Variable Sync
on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'The repo where the JSON file is (OWNER/REPO)'
        required: true
        default: 'my-org/source-repo'
      destination_repo:
        description: 'The repo to receive the variables (OWNER/REPO)'
        required: true
        default: 'my-org/dest-repo'
      json_file_path:
        description: 'Path to the JSON file in the source repo'
        required: true
        default: 'vars.json'

jobs:
  sync-vars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_repo }}
          token: ${{ secrets.PAT_TOKEN }} # Use a PAT for cross-repo access

      - name: Set Variables in Destination Repo
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }} # PAT must have 'actions:write' on destination
        run: |
          DEST_REPO="${{ github.event.inputs.destination_repo }}"
          FILE_PATH="${{ github.event.inputs.json_file_path }}"
          
          echo "Syncing variables to $DEST_REPO..."
          
          # Parse JSON and set variables in the destination repository
          jq -r 'to_entries[] | "\(.key) \(.value)"' "$FILE_PATH" | while read -r key value; do
            echo "Setting $key in $DEST_REPO..."
            gh variable set "$key" --body "$value" --repo "$DEST_REPO"
          done
