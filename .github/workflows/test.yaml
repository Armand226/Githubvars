name: Sync Variables to Environment
on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source Repo (OWNER/REPO)'
        required: true
      destination_repo:
        description: 'Destination Repo (OWNER/REPO)'
        required: true
      target_env:
        description: 'Select Environment'
        required: true
        type: choice
        options: [dev, test, prod]
      json_file_path:
        description: 'JSON file path'
        required: true
        default: 'vars.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_repo }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Ensure Environment and Set Variables
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          DEST="${{ github.event.inputs.destination_repo }}"
          ENV="${{ github.event.inputs.target_env }}"
          FILE="${{ github.event.inputs.json_file_path }}"

          # 1. Ensure the environment exists (ignores error if already exists)
          echo "Checking environment: $ENV in $DEST..."
          gh api -X PUT "repos/$DEST/environments/$ENV" --silent || echo "Environment already exists or created."

          # 2. Iterate and update variables
          jq -r 'to_entries[] | "\(.key) \(.value)"' "$FILE" | while read -r key value; do
            echo "Updating/Creating $key in $ENV..."
            # 'gh variable set' updates existing keys by default
            gh variable set "$key" --body "$value" --repo "$DEST" --env "$ENV"
          done
